<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATO Phonetic Game</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #111;
  color: #fff;
}
.container {
  margin-top: 40px;
}
button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}
input {
  padding: 10px;
  font-size: 18px;
  width: 250px;
  text-align: center;
}
textarea {
  padding: 10px;
  font-size: 18px;
  width: 80%;
  max-width: 600px;
  height: 80px;
  text-align: center;
}
#feedback {
  margin-top: 15px;
  font-size: 20px;
}
#description {
  margin-top: 10px;
  font-size: 16px;
  color: #ccc;
}
.correct { color: #4caf50; }
.wrong { color: #f44336; }
</style>
</head>
<body>
<div class="container">
  <h1>NATO Phonetic Alphabet Game</h1>

  <div>
    <button onclick="startAlphabetMode(false)">Alphabet Order</button>
    <button onclick="startAlphabetMode(true)">Random Order</button>
    <button onclick="startWordMode()">Word Mode</button>
  </div>

  <h2 id="prompt"></h2>
  <div id="description"></div>

  <input id="letterInput" placeholder="Type answer..." onkeydown="handleLetterKey(event)">
  <br><br>
  <textarea id="wordInput" placeholder="Type full NATO phonetic alphabet spelling here and press Enter..." onkeydown="handleWordKey(event)" style="display:none;"></textarea>

  <div id="feedback"></div>
</div>

<script>
const nato = {
  A: "alpha", B: "bravo", C: "charlie", D: "delta", E: "echo",
  F: "foxtrot", G: "golf", H: "hotel", I: "india", J: "juliett",
  K: "kilo", L: "lima", M: "mike", N: "november", O: "oscar",
  P: "papa", Q: "quebec", R: "romeo", S: "sierra", T: "tango",
  U: "uniform", V: "victor", W: "whiskey", X: "xray", Y: "yankee", Z: "zulu"
};

const descriptions = {
  BZ: "Good job",
  WTF: "What The F***",
  LC: "Loud and Clear",
  OM: "On the Move",
  DS: "Dumb S***",
  CF: "Cluster F***",
  NG: "No Go",
  ZT: "Zero Time (Greenwich time)"
};

let letters = Object.keys(nato);
let currentIndex = 0;
let order = [];
let mode = "";
let currentWord = "";

function startAlphabetMode(random) {
  mode = "alphabet";
  document.getElementById("letterInput").style.display = "inline-block";
  document.getElementById("wordInput").style.display = "none";
  document.getElementById("description").textContent = "";

  order = [...letters];
  if (random) order.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  nextLetter();
}

function startWordMode() {
  mode = "word";
  document.getElementById("letterInput").style.display = "none";
  document.getElementById("wordInput").style.display = "inline-block";

  const words = ["bz", "wtf", "vc", "lc", "om", "ds", "cf", "ng", "zt"];
  currentWord = words[Math.floor(Math.random() * words.length)].toUpperCase();

  document.getElementById("prompt").textContent = "Spell this word in NATO phonetic alphabet: " + currentWord;

  document.getElementById("description").textContent = descriptions[currentWord] || "";

  document.getElementById("wordInput").value = "";
  document.getElementById("feedback").innerHTML = "";
}

function nextLetter() {
  if (currentIndex >= order.length) {
    document.getElementById("prompt").textContent = "Done!";
    return;
  }
  document.getElementById("prompt").textContent = "Letter: " + order[currentIndex];
  document.getElementById("letterInput").value = "";
  document.getElementById("feedback").innerHTML = "";
}

function handleLetterKey(e) {
  if (e.key !== "Enter") return;
  const input = document.getElementById("letterInput").value.trim().toLowerCase();
  const correct = nato[order[currentIndex]];

  if (input === correct) {
    document.getElementById("feedback").innerHTML = `<span class='correct'>${input}</span>`;
    currentIndex++;
    setTimeout(nextLetter, 500);
  } else {
    document.getElementById("feedback").innerHTML = `<span class='wrong'>${input}</span> → <span class='correct'>${correct}</span>`;
  }
}

function handleWordKey(e) {
  if (e.key !== "Enter") return;

  const input = document.getElementById("wordInput").value.trim().toLowerCase().split(" ");
  const correctArr = currentWord.split("").map(l => nato[l]);

  let result = "";
  let allCorrect = true;

  for (let i = 0; i < correctArr.length; i++) {
    if (input[i] === correctArr[i]) {
      result += `<span class='correct'>${correctArr[i]}</span> `;
    } else {
      allCorrect = false;
      result += `<span class='wrong'>${input[i] || "_"}</span> `;
    }
  }

  document.getElementById("feedback").innerHTML = result;

  if (allCorrect) {
    setTimeout(startWordMode, 800);
  }
}
</script>
</body>
</html>
